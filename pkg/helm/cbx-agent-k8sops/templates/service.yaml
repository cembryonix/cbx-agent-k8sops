apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name | default (include "cbx-agent-k8sops.fullname" .) }}
  labels:
    {{- include "cbx-agent-k8sops.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
    - port: {{ .Values.service.backendPort }}
      targetPort: {{ .Values.service.backendTargetPort }}
      protocol: TCP
      name: backend
  selector:
    {{- include "cbx-agent-k8sops.selectorLabels" . | nindent 4 }}