apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cbx-agent-k8sops.fullname" . }}-config
  labels:
    {{- include "cbx-agent-k8sops.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.optionalConfig }}
  {{- range $key, $value := .Values.optionalConfig }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}